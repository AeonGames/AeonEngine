name: 🚧🍎 Build on macOS

on:
  push:
    paths-ignore:
      - '**.md'
      - '.astylerc'
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest
    name: 🚧🍎 clang

    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: '🍎 Install dependencies'
      run: |
        brew update
        brew install \
          flex \
          bison \
          gnu-sed \
          cmake \
          make \
          protobuf \
          zlib \
          libpng \
          glslang \
          portaudio \
          libogg \
          libvorbis \
          cairo \
          pango \
          libxml2 \
          libjpeg-turbo \
          googletest \
          qt6 \
          pkg-config \
          molten-vk \
          spirv-headers \
          spirv-tools \
          vulkan-extensionlayer \
          vulkan-headers \
          vulkan-loader \
          vulkan-profiles \
          vulkan-tools \
          vulkan-utility-libraries \
          vulkan-validationlayers \
          vulkan-volk

    - name: '🛠️ Set up Clang'
      run: |
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: '🚧 Build'
      run: |
        export PATH="/opt/homebrew/opt/bison/bin:$PATH"
        export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
        cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DUSE_AEONGUI=ON
        cmake --build build --parallel "$(sysctl -n hw.ncpu)"

    - name: '🧪 Run TESTS'
      run: |
        cd build
        ctest --output-on-failure