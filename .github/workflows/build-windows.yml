name: 🚧🪟 Build on Windows

on: [push, pull_request]

env:
  USERNAME: AeonGames
  VCPKG_EXE: C:\vcpkg\vcpkg.exe
  FEED_URL: https://nuget.pkg.github.com/AeonGames/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/AeonGames/index.json,readwrite;nugettimeout,900"
  VCPKG_FEATURE_FLAGS: "binarycaching,manifests,versions"
  VCPKG_VERBOSE: "1"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        compiler: [msvc]

    steps:
    - name: 🧰 Checkout
      uses: actions/checkout@v6

    - name: 🔄 Update Visual Studio
      shell: pwsh
      run: |
        & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" update --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" --quiet --wait
      if: matrix.compiler == 'msvc'

    - name: 🔃 Pin VCPKG Baseline
      shell: pwsh
      run: |
        $baseline = (Get-Content "${{ github.workspace }}/vcpkg-configuration.json" | ConvertFrom-Json)."default-registry".baseline
        Write-Host "Using vcpkg baseline: $baseline"
        cd C:\vcpkg
        git fetch origin $baseline --depth=1
        git checkout --force $baseline
        .\bootstrap-vcpkg.bat
      if: matrix.compiler == 'msvc'

    - name: 📦 Add NuGet sources
      shell: pwsh
      run: |
        .$(${{ env.VCPKG_EXE }} fetch nuget) `
          sources add `
          -Source "${{ env.FEED_URL }}" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "${{ env.USERNAME }}" `
          -Password "${{ secrets.PAT }}"
        .$(${{ env.VCPKG_EXE }} fetch nuget) `
          setapikey "${{ secrets.PAT }}" `
          -Source "${{ env.FEED_URL }}"
      if: matrix.compiler == 'msvc'

    - name: ⚙️ Configure CMake (Windows Visual Studio)
      shell: pwsh
      run: |
        cmake -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" -DUSE_AEONGUI=ON -B ${{github.workspace}}/build
      if: matrix.compiler == 'msvc'

    - name: 🔨 Build
      shell: pwsh
      run: cmake --build ${{github.workspace}}/build --parallel $env:NUMBER_OF_PROCESSORS

    - name: 🧪 Run Tests
      shell: pwsh
      run: |
        cd ${{github.workspace}}/build
        ctest --output-on-failure --verbose -C Debug
      if: matrix.compiler == 'msvc'